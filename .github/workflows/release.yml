name: Release & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.3.0). Leave empty to use package.json version.'
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  PACKAGES: "core web-component react vue angular"

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npx turbo build

      - name: Verify TypeScript
        run: |
          for pkg in core web-component react; do
            cd packages/$pkg && npx tsc --noEmit && cd "$GITHUB_WORKSPACE"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: packages/

  publish-npm:
    name: Publish to npmjs.com
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npx turbo build

      - name: Bump version (manual dispatch only)
        if: ${{ inputs.version != '' }}
        run: |
          for pkg in packages/core packages/web-component packages/react packages/vue packages/angular; do
            cd "$pkg" && npm version "${{ inputs.version }}" --no-git-tag-version && cd "$GITHUB_WORKSPACE"
          done

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./packages/core/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Publish all packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in core web-component react vue angular; do
            echo "Publishing packages/$pkg..."
            cd "packages/$pkg"
            npm publish --access public || echo "⚠️ packages/$pkg already published or failed"
            cd "$GITHUB_WORKSPACE"
          done

    outputs:
      version: ${{ steps.ver.outputs.version }}

  publish-github:
    name: Publish to GitHub Packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@zentto'

      - run: npm ci
      - run: npx turbo build

      - name: Bump version (manual dispatch only)
        if: ${{ inputs.version != '' }}
        run: |
          for pkg in packages/core packages/web-component packages/react packages/vue packages/angular; do
            cd "$pkg" && npm version "${{ inputs.version }}" --no-git-tag-version && cd "$GITHUB_WORKSPACE"
          done

      - name: Configure GitHub Packages registry
        run: |
          for pkg in core web-component react vue angular; do
            cat > "packages/$pkg/.npmrc" <<EOF
          @zentto:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          EOF
          done

      - name: Set repository field for GitHub Packages
        run: |
          for pkg in core web-component react vue angular; do
            cd "packages/$pkg"
            # GitHub Packages requires repository.url to match the repo
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('package.json','utf8'));
              p.repository = { type: 'git', url: 'https://github.com/zentto-erp/zentto-datagrid.git' };
              p.publishConfig = { registry: 'https://npm.pkg.github.com' };
              fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            "
            cd "$GITHUB_WORKSPACE"
          done

      - name: Publish all packages to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for pkg in core web-component react vue angular; do
            echo "Publishing packages/$pkg to GitHub Packages..."
            cd "packages/$pkg"
            npm publish || echo "⚠️ packages/$pkg already published or failed"
            cd "$GITHUB_WORKSPACE"
          done

  github-release:
    name: Create GitHub Release
    needs: [publish-npm, publish-github]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: ver
        run: echo "version=${{ needs.publish-npm.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          VERSION="v${{ steps.ver.outputs.version }}"
          CORE_VER="${{ steps.ver.outputs.version }}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          # Changelog from commits since last tag
          CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges 2>/dev/null || echo "- Initial release")

          cat > release-notes.md <<NOTES
          ## $VERSION

          ### Changes

          $CHANGES

          ### Published Packages

          | Package | Version | npm | GitHub |
          |---------|---------|-----|--------|
          | \`@zentto/datagrid-core\` | $CORE_VER | [npmjs](https://www.npmjs.com/package/@zentto/datagrid-core) | [ghcr](https://github.com/zentto-erp/zentto-datagrid/packages) |
          | \`@zentto/datagrid\` | $CORE_VER | [npmjs](https://www.npmjs.com/package/@zentto/datagrid) | [ghcr](https://github.com/zentto-erp/zentto-datagrid/packages) |
          | \`@zentto/datagrid-react\` | $CORE_VER | [npmjs](https://www.npmjs.com/package/@zentto/datagrid-react) | [ghcr](https://github.com/zentto-erp/zentto-datagrid/packages) |
          | \`@zentto/datagrid-vue\` | $CORE_VER | [npmjs](https://www.npmjs.com/package/@zentto/datagrid-vue) | [ghcr](https://github.com/zentto-erp/zentto-datagrid/packages) |
          | \`@zentto/datagrid-angular\` | $CORE_VER | [npmjs](https://www.npmjs.com/package/@zentto/datagrid-angular) | [ghcr](https://github.com/zentto-erp/zentto-datagrid/packages) |

          ---
          **Install:** \`npm install @zentto/datagrid@$CORE_VER\`
          NOTES

      - name: Create or update tag
        run: |
          VERSION="v${{ steps.ver.outputs.version }}"
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag "$VERSION"
            git push origin "$VERSION"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.ver.outputs.version }}"
          gh release delete "$VERSION" --yes 2>/dev/null || true
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file release-notes.md \
            --latest
